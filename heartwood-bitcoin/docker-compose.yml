version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: heartwood-bitcoin_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/alexm223/cairn:0.2.45@sha256:7294d4eedca4c50126f0600407c01e7737c1cd90237e456e3342f5f38d61a478
    restart: on-failure
    stop_grace_period: 1m
    init: true
    user: "1000:1000"
    ports:
      # Raw host port for hardware-wallet signing (needs an HTTPS secure context
      # that app_proxy's plain HTTP cannot provide). host 5588 -> container 3443.
      - "5588:3443"
      # Solo-mining stratum listeners (cairn-kgj7a). The in-app pool binds
      # 0.0.0.0 inside the container under CAIRN_PLATFORM=umbrel (cairn-bm7c2),
      # but without these host mappings no LAN miner can ever reach an Umbrel
      # install — the connection card's stratum+tcp:// address was a dead end.
      # 3333 = standard/small miners; 3334 = high-difficulty-floor ASIC port
      # (cairn-pz8v5). Mining is feature-flagged off by default; the listeners
      # only accept traffic when the pool is enabled in-app.
      - "3333:3333"
      - "3334:3334"
      # Native Stratum V2 listener (cairn-qfez8 wave 1, shipped v0.2.45).
      # Noise-encrypted miner connections on the same shared solo-pool
      # engine as 3333/3334 above. Flag-gated OFF by default
      # (mining_sv2_enabled), so this port accepts no traffic until an
      # admin turns it on under Settings — publishing it now avoids a
      # second store update just to expose it later (cairn-qfez8.23).
      - "3335:3335"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      # HTTP port app_proxy connects to
      PORT: 3000
      # Gates the Wave A Umbrel Electrum auto-connect probe (umbrelProbe.ts) —
      # without this, the probe never fires and the app silently stays on the
      # public electrum.blockstream.info default even when local electrs is
      # installed (see cairn-x26e). Never set on non-Umbrel deployments.
      CAIRN_PLATFORM: umbrel
      # First-run admin bootstrap; forces a credential reset on first login
      CAIRN_ADMIN_PASSWORD: ${APP_PASSWORD}
      # Keeps the session cookie non-Secure over plain-HTTP Umbrel and sets the
      # WebAuthn RP origin + notification deep links. Port MUST match manifest `port`.
      CAIRN_ORIGIN: http://${DEVICE_DOMAIN_NAME}:3217
      # Advertised HTTPS port, since the published host port (5588) differs from 3443
      CAIRN_HTTPS_EXTERNAL_PORT: 5588
      # Better client IPs for rate-limiting/audit behind the proxy; safely ignored if absent
      ADDRESS_HEADER: x-forwarded-for
      # Trust app_proxy's forwarded protocol/host so SvelteKit derives the real
      # http origin — without these, form POSTs fail SvelteKit's CSRF origin
      # check (adapter-node assumes https). app_proxy sets both by default.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
