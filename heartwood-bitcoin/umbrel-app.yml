manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.21"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  This release adds coinbase-maturity awareness: mining rewards show a clear
  "maturing" countdown and can't be spent or used for fee-bumping until they
  unlock. Fee selection now supports sub-1 sat/vB fees end-to-end when your
  node's relay policy allows it, and transaction details include a new block
  visualization combining Electrum and Core RPC data. Multisig gets safer
  key-path checks, owner notifications when a pending cosigner removes
  themselves, and backups that capture multisig shares and key assignments.
  The block explorer no longer depends on Esplora — it runs entirely on your
  own Electrum and Core RPC connections, with clearer per-backend health
  status. This release also fixes delete-guard races around broadcasts,
  emoji/multi-byte name-truncation bugs, and formula-injection edge cases in
  exports, plus faster wallet scanning and steadier Electrum reconnects,
  backed by another large test-coverage wave. Full changelog:
  https://github.com/AlexM223/cairn/releases/tag/v0.2.21
