manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.48"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Navigation is simplified: four sections (Home, Wallets, Mining, Explorer —
  Mining and Explorer only show up if you've turned them on), one Settings
  page instead of several, and no more developer jargon. Technical terms
  are still there if you want them, just a tap away instead of front and
  center. The admin area is renamed Health and simplified too. If you had
  the old feature-flags page bookmarked, it now redirects to the new
  settings. Explorer is on by default for new installs, and first-time
  admins get a setup card walking through initial configuration.


  Mining now connects to your Umbrel's Bitcoin Node automatically — no RPC
  setup. Install the Bitcoin Node app if you don't have it; if you installed
  it after Heartwood, restart Heartwood once to pick up the connection. The
  mining Start button also stops failing silently: if it can't reach your
  node, it now tells you why instead of doing nothing.


  Solo mining can also speak Stratum V2 now: an optional, encrypted
  connection mode for compatible ASIC firmware on port 3335, with
  per-miner vardiff and optional version rolling. It's off by default —
  turn it on under Settings → Mining if your miner supports it. Regular
  mining (ports 3333 and 3334) keeps working exactly as before, and those
  ports are now actually reachable from other devices on your network.


  Other recent improvements: a single unified path for sending money from
  both regular and multisig wallets; public pool stats and a leaderboard
  on the block explorer with a celebration when your miner finds a block;
  safer invite links for bringing family or crew aboard; a redesigned send
  flow that shows the fee up front; fixed receive-QR contrast and
  notification bell on small phones; and full regtest/testnet support.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.48,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.47,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.46,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.45, and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.44
