manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.40"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Full regtest and testnet support: your wallets now follow whatever
  network your instance is configured for everywhere, including building
  and signing transactions, not just balances and history.


  New wallets show accurate balances right away instead of needing a
  refresh after creation. If one shared wallet has a misconfigured
  connection, it no longer breaks monitoring for your other wallets, and
  shows a plain-language "this wallet needs attention" message instead of
  a confusing error. The block explorer now tells you honestly when a
  transaction ID truly doesn't exist. Mining notifications can now
  actually be delivered outside the app instead of only showing in-app,
  and a few missing notification-settings rows were added. Amounts are
  shown in your chosen unit consistently everywhere, and the minimum
  "dust" spend amount is now applied consistently.


  Also in this update: a wallet you were part-way through setting up, or
  a payment you started but didn't finish sending, now shows up as a
  pending draft on the wallet page with a clear "resume" notice; address
  transaction history degrades gracefully instead of erroring out on
  Electrum-only setups; the backup reminder eases off the longer you've
  had the app set up; clearer first-deposit messaging; Send-flow fixes for
  fiat-hidden/unit display preferences; and simplified technical wording
  on admin pages.


  And from recent releases: pasting a multisig wallet config now correctly
  hands off to the multisig setup flow; clearer navigation labels (no more
  three different things all called "notifications"; "Node" is now
  "Health"); a consistent "can't reach the Bitcoin network" message with a
  calmer color for brief hiccups; and a transaction-search fix.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.40,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.39,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.38, and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.37
