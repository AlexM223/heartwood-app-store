manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.39"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  A wallet you were part-way through setting up, or a payment you started
  but didn't finish sending, now shows up as a pending draft on the wallet
  page with a clear "resume" notice instead of quietly disappearing.
  Address transaction history now degrades gracefully instead of erroring
  out on Electrum-only setups that don't support full history lookups.


  The backup reminder now eases off the longer you've had the app set up
  instead of nagging at full volume forever, and the first-deposit screen
  has clearer messaging while you're waiting for funds to arrive and while
  a deposit is still confirming.


  Fixed a couple of spots in the Send flow that ignored your fiat-hidden
  and sats/BTC display preferences, and simplified more technical wording
  on admin pages. Activity-feed entries now open the right page the same
  way notifications do.


  Also from recent releases: pasting a multisig wallet config (instead of
  uploading the file) now correctly hands off to the multisig setup flow;
  clearer navigation labels (the notification bell, personal notification
  settings, and admin notification page are no longer all just called
  "notifications"; "Node" is now "Health"); a consistent "can't reach the
  Bitcoin network" message across the app with a calmer color for brief
  hiccups; amounts that respect your chosen display unit; a transaction
  search fix; and a mining-page mobile navigation fix.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.39,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.38, and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.37
