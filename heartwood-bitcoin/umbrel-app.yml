manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.41"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Fixed the receive-payment QR code's contrast so it reliably scans, and
  fixed the notification bell being unreachable on small phone screens.


  When speeding up a payment, you can now choose your own fee rate instead
  of only the app's suggestion, and a payment that got replaced by a
  faster one is now correctly labeled "Replaced" instead of showing as
  "Failed". The "can't reach your node" banner now appears faster, and
  more technical labels were simplified to plain language.


  Recent releases also brought: full regtest/testnet support (wallets
  follow your instance's network everywhere, including building and
  signing transactions); fresh balances on new wallets; one misconfigured
  shared wallet no longer breaks monitoring for others; an honest explorer
  not-found for unknown transactions; externally-deliverable mining
  notifications; pending-draft/send-resume recovery; graceful address-
  history degradation on Electrum-only setups; a decaying backup reminder;
  clearer first-deposit messaging; paste-path multisig-config detection;
  and consistent unit/fiat display and chain-status copy throughout.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.41,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.40,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.39,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.38, and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.37
