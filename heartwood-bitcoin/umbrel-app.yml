manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.45"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Solo mining can now speak Stratum V2: an optional, encrypted connection
  mode for compatible ASIC firmware on port 3335. It's off by default —
  turn it on under Settings → Mining if your miner supports it. Regular
  mining (ports 3333 and 3334) keeps working exactly as before. Also
  fixed: the solo-mining ports are now actually reachable from other
  devices on your network — previously the connection card showed an
  address that could never connect.


  A single, unified path now handles sending money for both regular and
  multisig wallets, closing two subtle gaps that only affected multisig
  in rare edge cases. The block explorer gained public pool stats and a
  leaderboard, plus a small celebration when your miner finds a block,
  and ASIC miners get their own high-difficulty port.


  Other recent improvements: safer invite links for bringing family or
  crew aboard, with a preview that never leaks private wallet data before
  they accept; a redesigned send flow that shows the fee up front; a new
  Health page; simplified navigation (8 sections down to 3); and hardened
  handling of a rare notification/chain-reorg edge case and a coinbase-
  maturity bug.


  Earlier releases also brought: fixed receive-QR contrast and a
  reachable notification bell on small phones; custom fee rates when
  speeding up a payment; correct "Replaced" labeling for bumped payments;
  full regtest/testnet support; and consistent unit/fiat display
  throughout.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.45,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.44,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.43,
  https://github.com/AlexM223/cairn/releases/tag/v0.2.42, and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.41
