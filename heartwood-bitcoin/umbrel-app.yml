manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.35"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Desktop layout overhaul: every page now gets a full labeled sidebar and
  wide-screen layouts instead of a stretched mobile view, across home,
  send, wallets, explorer, mining, mempool, activity, and settings.


  Real-time everywhere: confirmations, balances, transaction lists, the
  activity feed, explorer blocks, mempool stats, and mining/hashrate
  figures now update live over a single multiplexed stream — no more
  manual refreshing. Fixed a bug where a transaction page could show two
  conflicting confirmation counts.


  Also included: solo mining pool support — every Heartwood instance can
  now run its own multi-user Stratum V1 solo pool, with per-user worker
  identity, opt-in enable/disable, payout wallet selection, live
  worker/hashrate view, block-earned tracking with maturity status, solo
  odds, and an admin-side pool dashboard.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.35
  and https://github.com/AlexM223/cairn/releases/tag/v0.2.34
