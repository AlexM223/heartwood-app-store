manifestVersion: 1
id: heartwood-bitcoin
category: bitcoin
name: Heartwood
version: "0.2.38"
tagline: Your self-hosted Bitcoin command center
description: >-
  Heartwood is a self-hosted Bitcoin command center: a block explorer,
  watch-only wallets, PSBT construction, hardware-wallet signing, multisig,
  and multi-user access with passkeys — all running against your own node.


  First run: open the app and sign in with the username and password shown
  on this page (Umbrel fills them in for you). You'll immediately be asked to
  set your own email and password — the initial credentials are single-use and
  cannot be reused.


  Hardware-wallet signing (WebHID/WebSerial) requires a browser secure context,
  so it is served over HTTPS at https://<your-umbrel-host>:5588. Your browser
  will warn about the self-signed certificate that Heartwood generates on first
  boot — accept it to continue. Everything else works over the normal app URL.


  Chain backend: Heartwood connects to your own Electrum server or Bitcoin Core
  RPC. Configure this under Settings → Chain Backend after logging in; no
  external services are contacted.
releaseNotes: >-
  Pasting a multisig wallet config (instead of uploading the file) now
  correctly hands off to the multisig setup flow instead of failing as an
  invalid key.


  Clearer navigation and settings: the notification bell, your personal
  notification settings, and the admin notification page now have distinct
  names instead of all being called "notifications"; the shortcut links on
  the admin home page jump straight to the right settings section; some
  technical wording was simplified (for example, "Node" is now "Health").


  The "can't reach the Bitcoin network" message is now consistent everywhere
  it appears, with a calmer color for brief, recoverable connection hiccups.
  Amounts you type now respect your chosen display unit instead of always
  resetting to sats.


  Fixed transaction search sometimes showing "not found" for a transaction
  ID when it was actually a temporary lookup error, and fixed notifications
  not always opening the right page.


  Also includes a mobile navigation fix for the mining page and dependency
  hardening from v0.2.37.


  Full changelog: https://github.com/AlexM223/cairn/releases/tag/v0.2.38 and
  https://github.com/AlexM223/cairn/releases/tag/v0.2.37
